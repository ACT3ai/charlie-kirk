# Contact research for Rep. Thomas Massie (KY-4).
# Produced by p_write_letter.md (Stage 6) via web search on 2026-06-19.
# Drives the mailing of the Charlie Kirk laws letter: every place to mail,
# every person/title to address. Nothing fabricated — unverified fields are
# null with verified: unverified.

thomas_massie:
  full_name: Thomas Harold Massie
  office: U.S. Representative, Kentucky's 4th Congressional District
  party: Republican

  # How to correctly address the letter (formal U.S. Representative form).
  how_to_address:
    envelope_recipient_line: The Honorable Thomas Massie
    inside_address_lines:
      - The Honorable Thomas Massie
      - U.S. House of Representatives
      - 2371 Rayburn House Office Building
      - Washington, DC 20515
    salutation: "Dear Representative Massie:"   # or "Dear Congressman Massie:"
    addressing_a_staffer_by_title: "Dear <Title> (e.g. Dear Chief of Staff):"
    note: >
      For a sitting U.S. Representative the envelope uses "The Honorable
      Thomas Massie"; the salutation uses "Dear Representative Massie:" or
      "Dear Congressman Massie:". When no staff name is known, address the
      envelope to the title (e.g. "Chief of Staff, Office of Rep. Thomas
      Massie").
    source: https://www.house.gov/representatives
    verified: true

