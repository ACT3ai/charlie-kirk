<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Helvetica, Arial, sans-serif">

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="900" fill="#0F1B2D"/>

  <!-- Top title bar -->
  <rect x="0" y="0" width="1600" height="140" fill="#C8102E"/>
  <text x="800" y="92" text-anchor="middle" font-size="54" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    FOUR LAWS FOR CHARLIE KIRK INVESTIGATION
  </text>

  <!-- Decorative gold accent stripe under top bar -->
  <rect x="0" y="140" width="1600" height="6" fill="#D4AF37"/>

  <!-- Center content area -->

  <!-- Large "3" badge on left -->
  <rect x="180" y="280" width="320" height="320" fill="#D4AF37"/>
  <rect x="180" y="280" width="320" height="60" fill="#0F1B2D"/>
  <text x="340" y="318" text-anchor="middle" font-size="32" font-weight="700" fill="#D4AF37" letter-spacing="4">LAW</text>
  <text x="340" y="560" text-anchor="middle" font-size="220" font-weight="900" fill="#0F1B2D">3</text>

  <!-- Vertical divider -->
  <rect x="560" y="280" width="6" height="320" fill="#C8102E"/>

  <!-- Right-side content blocks -->

  <!-- 20 Agents block -->
  <rect x="620" y="280" width="800" height="90" fill="#1B2D4A"/>
  <rect x="620" y="280" width="14" height="90" fill="#C8102E"/>
  <text x="660" y="338" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="1">20 AGENTS PER TEAM</text>

  <!-- $10 Million block -->
  <rect x="620" y="395" width="800" height="90" fill="#1B2D4A"/>
  <rect x="620" y="395" width="14" height="90" fill="#C8102E"/>
  <text x="660" y="453" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="1">$10 MILLION INDEPENDENT BUDGET</text>

  <!-- 2 Year Minimum block -->
  <rect x="620" y="510" width="800" height="90" fill="#1B2D4A"/>
  <rect x="620" y="510" width="14" height="90" fill="#C8102E"/>
  <text x="660" y="568" font-size="44" font-weight="700" fill="#FFFFFF" letter-spacing="1">2 YEAR MINIMUM COMMITMENT</text>

  <!-- Sub-headline above blocks -->
  <text x="800" y="240" text-anchor="middle" font-size="36" font-weight="400" fill="#D4AF37" letter-spacing="3">
    MANDATORY INVESTIGATION
  </text>

  <!-- Caption below blocks -->
  <text x="800" y="680" text-anchor="middle" font-size="28" font-weight="400" fill="#FFFFFF" letter-spacing="2">
    FBI. CIA. NSA. ODNI. Four Real Investigations.
  </text>

  <!-- Bottom accent stripe -->
  <rect x="0" y="754" width="1600" height="6" fill="#D4AF37"/>

  <!-- Bottom title bar -->
  <rect x="0" y="760" width="1600" height="140" fill="#C8102E"/>
  <text x="800" y="852" text-anchor="middle" font-size="54" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    LAW #3: MANDATE THE INVESTIGATION
  </text>

</svg>
