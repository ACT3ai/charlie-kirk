
planes:
  - plane:
      identifier: N1098L
      aircraft_type: Bombardier Global 6500 (G6500)
      program: US Army HADES (High Accuracy Detection and Exploitation System) ISR
      operator_owner: LASAI Aviation II LLC / associated with Sierra Nevada Corp / SAIC-Leidos (training/spy plane context)
      y_interesting: |
        Key spy/surveillance plane in the investigation heavily discussed on X/Twitter. On Sept 10, 2025, it made multiple low-altitude passes (down to ~204-600 ft AGL, slow speeds ~118 knots) directly adjacent to/over UVU in Orem during and ~20-24 minutes after the 12:23 PM MDT shooting. Prominent citizen investigator John Cullen (@I_Am_JohnCullen) on X described it as a CIA-linked or military ISR asset capable of drone launch/retrieval or signals intelligence. Theories suggest it was conducting real-time surveillance of the event or involved in the operation (e.g., possible drone deployment for the hit). No official confirmation of direct involvement; some describe as routine training/defense ops. Later flights (e.g., to Washington area) also scrutinized. Part of broader ISR Program Context. Extensive online discussion on X flags it as highly suspicious due to timing, altitude, and capabilities. Posts question why it was ignored by mainstream while highlighting "spook" activity.
      relevant_dates: September 10, 2025 (multiple passes over Orem/UVU)
      tracking_notes: Low-level flight data publicly tracked on ADS-B; some flights not fully listed in public data. X threads by John Cullen and others include flight path images and analysis.
      trips:
        - trip_entry:
            start: Various waypoints near Provo/Orem area, Utah
            destination: Multiple low-altitude passes directly adjacent to/over UVU campus in Orem
            y_interesting: |
              Surveillance/ISR mission with multiple low-altitude, slow-speed passes over/near the assassination site. First pass earlier in the day; second pass ~20-24 minutes after the 12:23 PM MDT shot (reported ~204 ft AGL, 118 knots). X posts by John Cullen and others highlight this as potential real-time monitoring or operational support. Citizen investigators theorize drone-related activity or signals intelligence collection during the event. No official link confirmed; debated as routine vs. targeted.
            who: US Army HADES program / LASAI Aviation II LLC associated operators
            start_time: September 10, 2025, multiple passes around 12:23 PM MDT and post-shooting (~12:43-12:47 PM MDT window)
            destination_time: Ongoing circling/passes in Orem/UVU vicinity
            other_properties: Aircraft: Bombardier Global 6500. Extremely low altitude and slow speed noted in X analysis and flight tracking data. Part of HADES ISR capabilities for high-accuracy detection.

  - plane:
      identifier: SU-BTT
      aircraft_type: Dassault Falcon 7X
      operator_owner: Egypt Air Force / Egyptian Government
      y_interesting: |
        Egyptian military/government jet frequently highlighted by Candace Owens (@RealCandaceO) and plane trackers on X. Alleged to have tracked Erika Kirk's (and sometimes Charlie Kirk's) movements extensively from ~2022–2025, with dozens of location overlaps including international flights and ties to Israel/Provo. On/around Sept 10, 2025, activity near Provo; reports of departure from Provo shortly after the assassination and possible drop-off of personnel 6 days prior (Sept 4). X posts amplify Candace Owens' timeline showing patterned behavior around TPUSA events. Theories involve foreign surveillance, possible joint ops with Mossad/Israeli interests (via Saprea links in other planes), or involvement in monitoring Kirk/TPUSA. "Egyptian Plane Armada" refers to this and similar aircraft (e.g., SU-BND) showing repeated proximity. Many X threads call it a "smoking gun" in conspiracy discussions.
      relevant_dates: Multiple overlaps 2022–Sept 2025; Provo-area activity Sept 10, 2025 (including possible morning departure)
      tracking_notes: Public ADS-B data shows unusual frequency near targets. X posts include timelines, flight maps, and Candace Owens show clips.
      trips:
        - trip_entry:
            start: Provo area, Utah (arrivals noted around early September 2025)
            destination: Provo, Utah / possible departure post-assassination; earlier international routing via Paris-Le Bourget
            y_interesting: |
              Patterned tracking of Kirk family and TPUSA events. X reports (amplified by Candace Owens) claim arrival/drop-off of military subcontractors in Provo ~Sept 4, 2025 (6 days before assassination), with activity continuing around Sept 10. Theories of foreign operatives or surveillance team insertion. One X post references tip about Egyptian plane leaving Provo morning of the assassination. Broader "Armada" context with SU-BND.
            who: Egyptian Air Force / Government operators
            start_time: Multiple instances 2022–2025; specific Provo activity early Sept 2025 and around Sept 10
            destination_time: Various; alleged post-event departure from Provo area
            other_properties: Dassault Falcon 7X. Frequent international and domestic overlaps with Kirk movements per X OSINT and Candace Owens timelines.

  - plane:
      identifier: N888KG
      aircraft_type: Bombardier Challenger 300 (BD-100-1A10)
      operator_owner: N888KG LLC (associated with Derek Maxfield / Komigo / Saprea foundation, which has Israel connections)
      y_interesting: |
        The "Wendover Vanish" or "Provo Vanish" plane at center of major conspiracy theories on X. Departed Provo Airport (PVU, ~12 min from UVU) ~1 hour after the shooting. Mid-flight ADS-B/transponder gap (~30-50+ minutes while heading toward Page, AZ), then reappeared and returned to Provo. Owner stated it was a prescheduled flight; FAA/ATC termination was standard for non-towered airports. Conspiracists on X suspect getaway vehicle for shooter or related actors. FBI/Kash Patel addressed it, attributing gap to rural coverage (not illegal transponder off). Not part of official investigation per fact-checks, but timing and "vanish" fuel extensive speculation. Saprea/Israel links add layers to theories. Many X posts question "Where is the shooter?" and link to possible cover.
      relevant_dates: September 10, 2025
      tracking_notes: Documented gap in public tracking; owner clarification issued. Heavily discussed in X threads with flight path screenshots.
      trips:
        - trip_entry:
            start: Provo Airport (PVU), Utah
            destination: Page Municipal Airport (PGA), Arizona (then return to Provo)
            y_interesting: |
              N888KG flight. Departed ~1 hour after assassination. Mid-flight tracking gap (ADS-B disappearance ~30+ min). Owner: prescheduled; standard non-towered airport procedure. Conspiracists on X: possible shooter getaway or related. Not officially linked. Saprea foundation Israel connections fuel deeper theories.
            who: Private charter / N888KG LLC (Derek Maxfield company)
            start_time: ~1:11–1:20 PM MDT, September 10, 2025
            destination_time: Landed PGA ~1:48 PM MDT; returned/landed Provo ~3:06 PM MDT
            other_properties: Aircraft: Bombardier Challenger 300. Tracking gap explained by owner/FAA as routine; rural area coverage issues cited by officials. X posts include video analysis and "vanish" memes.

