egyptian_overlap_claims_summary:
  planes_focus: SU-BTT ("blue plane") and SU-BND ("yellow plane") primary; SU-BTU, SU-BTV, SU-BGM cited as additional Armada members (five tails total).
  time_range: 2022 to September 2025
  cited_overlap_numbers:
    - 73 overlaps
    - 72 times
    - "70+"
    - 68 overlaps (including international trips)
  charlie_subset: Out of 68 overlaps, 29 are claimed to have included Charlie Kirk (the rest attributed to Erika Kirk only).
  primary_target_claim: Most overlaps attributed to Erika Kirk's locations/travel; planes also cited in cities of TPUSA / TPUSA Faith events and Charlie Kirk appearances.
  candace_owens_clarification: |
    Candace Owens (@RealCandaceO) discussed the data on her show, shared screenshots/spreadsheets, called it suspicious, and stated she sent information to the FBI. She clarified that NO ONE claimed Erika or Charlie flew *on* the planes — only that the planes were in the same locations/cities as Erika, Charlie, or TPUSA events. Quote: planes crossed into "so many cities that Charlie or myself or other TPUSA faith people were speaking in."
  statistical_framing: Proponents call the pattern "statistically near impossible without intent"; critics call the overlap criteria too loose (see criticisms_and_debunkings).

geographic_concentration:
  states_concentration: Five states cited in one analysis - Missouri, Delaware, Utah, Nebraska, Kansas.
  key_locations:
    - location: Provo / Orem, UT
      detail: Key focus. SU-BTT arrived ~9/4, departed morning 9/10; SU-BND on ground all day 9/10 (transponder/power on), departed 9/11. SU-BTU, SU-BTV, SU-BGM cited in preceding months. Cross-referenced with TPUSA events.
    - location: Wichita, KS
      detail: SU-BTT made "no fewer than 8 stops." Critics cite Wichita as the "Air Capital of the World" / Dassault maintenance hub (Yingling Aviation, FAA Part 145) as a routine explanation.
    - location: Delaware
      detail: |
        An Egyptian plane landed and stayed the night of 9/10 (assassination day). Candace Owens posted that "a foreign dignitary was picked up after arriving from Provo the morning of Charlie's assassination on the Egyptian plane, and then transferred to 920 King for some joint operation" - 920 N King St, Wilmington, a joint DHS/FBI/DEA office (building otherwise mostly law firm + eatery).
    - location: Scottsdale, AZ
      detail: Cell-phone pickup claims - Andrew alleged to land at Scottsdale 1:40 PM to pick up Erika's cell phone (tied to SU-BND transponder activity).
    - location: Nashville, TN
      detail: Mentioned in broader SAM-flight itineraries.
    - location: Colorado Springs, CO
      detail: Military/intel hub; linked to SAM flights and Fort Huachuca timeline in related threads.
    - location: Fort Huachuca, AZ
      detail: Army intelligence base; alleged pre-event meetings ~Sept 8-9, 2025 (tied to SAM 99-0404, SAM650, SAM702).

israel_connections_context: |
  Users claim the Egyptian jets routinely fly to Israel with transponders off at certain points, alleging logs are falsified as CAI-CAI (Cairo-Cairo) or N/A-CAI. Full per-plane date lists are recorded under each plane's israel_trips field (SU-BTT, SU-BTV, SU-BTU). One corroborated example cited: SU-BTT flew Cairo to Israel on Oct 21, 2025 reportedly carrying head of Egyptian intelligence Hassan Rashad (per Israeli Channel 12 News). Patterns described by proponents as "consistent and undeniable" and linked to possible joint ops; possible motives floated include geopolitical / Israel ties via the Egypt peace treaty and surveillance of pro-Israel voices. Presented as user theory, not established fact.

criticisms_and_debunkings:
  - source: "@Liz_Wheeler"
    point: Loose overlap definition
    detail: |
      Spreadsheets used +/- 3 days and the same "region" (50-100 miles), not the same day / same airport. Quote: "When you narrow the parameters to Egyptian planes landing on the same day in the same location, the overlap dwindles to... one. On 9/10 in Utah."
  - source: Various independent analyses referenced on X
    point: Data errors
    detail: UTC vs. local time mistakes (e.g., Provo departure timing), wrong continents/locations (~60-66% of claims allegedly incorrect in some analyses), routine maintenance misinterpreted as surveillance.
  - source: Critics / aviation context
    point: Wichita stops are routine
    detail: Wichita stops explained as normal for Dassault/Falcon jet maintenance, not surveillance.
  - source: Maintenance contracts
    point: Long-standing service relationships
    detail: Duncan Aviation - Egyptian Air Force VIP maintenance contracts; John Cullen (@I_Am_JohnCullen) cited Falcon maintenance contracts dating back to 1999 to dismiss strong assassination association. Transponder issues described as common for certain ops.
  - source: Erika Kirk responses
    point: Denials / coincidence framing
    detail: |
      Pushed back with flight logs, photos, alibis; denied being in claimed places; pregnancy/hospital references in some counters. Attributed quote: "I actually had no idea there were Egyptian planes... It could very well just be a coincidence." Offered evidence.
  - source: Grok / general reviews
    point: No verified strict co-locations
    detail: Grok responses note public ADS-B data shows activity but no proven surveillance or assassination link; no verified co-locations in strict same-time/same-place terms per some reviews; official investigation focuses on a lone shooter.

