
planes:
  - plane:
      identifier: N1098L
      aircraft_type: Bombardier Global 6500 (G6500)
      program: US Army HADES (High Accuracy Detection and Exploitation System) ISR / AXLE21 or similar "training" cover (LASAI Aviation II LLC / Leidos / SNC-associated)
      callsign: Often AXEL10 (mission call sign noted on 9/10/2025)
      operator_owner: LASAI Aviation II LLC / associated with Sierra Nevada Corp / SAIC-Leidos (training/spy plane context)
      y_interesting: |
        Key spy/surveillance plane in the investigation heavily discussed on X/Twitter. On Sept 10, 2025, it made multiple low-altitude passes (down to ~204-600 ft AGL, slow speeds ~118-150 knots) directly adjacent to/over UVU in Orem during and ~20-24 minutes after the 12:23 PM MDT shooting. Prominent citizen investigator John Cullen (@I_Am_JohnCullen) on X described it as a CIA-linked or military ISR asset capable of drone launch/retrieval or signals intelligence. Theories suggest it was conducting real-time surveillance of the event or involved in the operation (e.g., possible drone deployment for the hit). No official confirmation of direct involvement; some describe as routine training/defense ops. Later flights (e.g., to Washington area) also scrutinized. Part of broader ISR Program Context. Extensive online discussion on X flags it as highly suspicious due to timing, altitude, and capabilities. Posts question why it was ignored by mainstream while highlighting "spook" activity. Linked to Fort Huachuca (Army intelligence base) for command/relay per some theories.
      relevant_dates: September 10, 2025 (multiple passes over Orem/UVU); post-event activity noted into Sept 11+
      tracking_notes: Low-level flight data publicly tracked on ADS-B; some flights not fully listed in public data. X threads by John Cullen and others include flight path images, videos, and analysis. Callsign often AXEL10. Departed Briggs area or similar; loops over Orem documented on FlightAware.
      detailed_x_analysis: |
        John Cullen Patreon/YouTube: "Why Was a Pentagon HADES Spy Plane at the Scene of Charlie Kirk's Assassination, Twice That Day?" Promotes drone launch/recovery theory (one armed drone allegedly shot Kirk). @raumgeist and others: N1098L as command center/relay station to Fort Huachuca for "Task Force Charlie"; software coordination for operation; possible ground station on campus or backpack. @hurtfeelingzday: ON 9/10/2025 air force jet N1098L mission call sign AXEL10 ... descended to 300 ft, slowed to 150k and looped around Orem. At 1127 MT, it left FCA and did the same low alt/speed loop around Orem. @tjphager: Initial interest to refute John Cullen's "nonsense" on drone deployment from N1098L over PVU; learned from threads. Debates on ISR capabilities with only interior equipment. Part of fleet scrutiny with N2100L. Some X users call it "spy/drone swarm plane on site." Specific FlightAware legs cited: 20250910/1348Z KBIF/KGPI (setup/calibration?), 20250910/1732Z KGPI/KBIF (data collection? dive ~30s after bang); rest of day tracks (KHII, KSNS, KBIF).
      conspiracy_theories: |
        Drone deployment for the hit (John Cullen core theory); real-time ISR/surveillance/command during assassination; link to Fort Huachuca pre-event meetings; possible deep state/military involvement in sophisticated op (tunnels, wrong-direction shooting claims in broader theories). "Demonstration of latest cutting-edge warfare techniques." Questions why ignored by mainstream.
      debunkings_official_responses: |
        Some describe as routine training/defense ops. No official confirmation of involvement. Critics note not equipped to full HADES contracted specs (interior equipment only per some debates; no visible exterior mods for full HADES ME-11B specs per critics).
      related_investigators: John Cullen (@I_Am_JohnCullen), @raumgeist, @hurtfeelingzday, @tjphager, broader X OSINT community
      trips:
        - trip_entry:
            start: Various waypoints near Provo/Orem area, Utah (e.g., from KBIF/Briggs area)
            destination: Multiple low-altitude passes directly adjacent to/over UVU campus in Orem; continued to other areas (e.g., KGPI, KHII, KSNS, KBIF)
            y_interesting: |
              Surveillance/ISR mission with multiple low-altitude, slow-speed passes over/near the assassination site. First pass earlier in the day; second pass ~20-24 minutes after the 12:23 PM MDT shot (reported ~204 ft AGL, 118 knots; other data: descended to 300 ft, slowed to 150k, looped around Orem). X posts by John Cullen and others highlight this as potential real-time monitoring or operational support. Citizen investigators theorize drone-related activity or signals intelligence collection during the event. Specific FlightAware links shared: e.g., 20250910/1348Z KBIF/KGPI (setup/calibration?), 20250910/1732Z KGPI/KBIF (data collection? dive ~30s after bang), rest of day tracks. No official link confirmed; debated as routine vs. targeted. Linked to Fort Huachuca (Army intelligence base) for command/relay.
            who: US Army HADES program / LASAI Aviation II LLC associated operators
            start_time: September 10, 2025, multiple passes around 12:23 PM MDT and post-shooting (~12:43-12:47 PM MDT window); morning pass noted
            destination_time: Ongoing circling/passes in Orem/UVU vicinity; continued flights
            other_properties: Aircraft: Bombardier Global 6500. Extremely low altitude and slow speed noted in X analysis and flight tracking data. Part of HADES ISR capabilities for high-accuracy detection. Interior equipment only per some debates; no visible exterior mods for full HADES ME-11B specs per critics.

  - plane:
      identifier: SU-BTT
      nickname: "Blue plane" (primary jet discussed by Candace Owens)
      aircraft_type: Dassault Falcon 7X
      operator_owner: Egypt Air Force / Egyptian Government (Egyptian Air Force / intelligence-linked)
      role_in_claims: Primary of the two specific Egyptian-registered planes (with SU-BND) alleged to have repeatedly overlapped Erika Kirk's locations/travel.
      y_interesting: |
        Egyptian military/government jet frequently highlighted by Candace Owens (@RealCandaceO) and plane trackers on X. Alleged to have tracked Erika Kirk's (and sometimes Charlie Kirk's) movements extensively from ~2022–2025, with dozens of location overlaps including international flights and ties to Israel/Provo. On/around Sept 10, 2025, activity near Provo; reports of departure from Provo shortly after the assassination and possible drop-off of personnel 6 days prior (Sept 4). X posts amplify Candace Owens' timeline showing patterned behavior around TPUSA events. Theories involve foreign surveillance, possible joint ops with Mossad/Israeli interests (via Saprea links in other planes), or involvement in monitoring Kirk/TPUSA. "Egyptian Plane Armada" refers to this and similar aircraft (e.g., SU-BND) showing repeated proximity. Many X threads call it a "smoking gun" in conspiracy discussions.
      overlap_claims: |
        Cited numbers for SU-BTT + SU-BND overlapping Erika Kirk's locations 2022–Sept 2025 vary across X posts: 73 overlaps, 72 times, 70+, or 68 overlaps (including international trips). One claim specifies that out of 68 overlaps, 29 included Charlie Kirk.
        Representative quotes:
        - "72 times those exact planes followed Erika Kirk, not a plane like it, those 2 planes. That is statistically near impossible without intent."
        - "Two specific Egyptian-registered planes (tail numbers SU-BTT and SU-BND...) showed repeated overlaps with Erika Kirk's locations and travel patterns. These overlaps occurred 73 times between 2022 and September 2025."
        - "The Egyptian military plane was tracking Erika Kirk NOT Charlie Kirk! Between 2022 and September of 2025, both the blue plane and yellow plane showed 68 overlaps with Erika Kirk's location, including trips she took outside of the country. Out of those 68 instances, 29 of them included Charlie."
      provo_timeline:
        arrival: Flew into Provo on 9/4/2025 (6 days before the assassination)
        departure: Departed the morning of 9/10/2025 (assassination day)
        note: One X post states it was "on the ground in Provo the day of the hit."
      us_locations:
        - location: Wichita, KS
          detail: SU-BTT (Dassault) made "no fewer than 8 stops." Critics note Wichita is the "Air Capital of the World" with aviation maintenance hubs (e.g., Yingling Aviation for Dassault jets, FAA Part 145 work, ties to Wichita State University / Dassault since 2015), explaining routine stops rather than surveillance.
        - location: Provo/Orem, UT
          detail: Arrived ~9/4/2025, departed morning of 9/10/2025. Key focus of assassination-day discussion.
        - location: Delaware
          detail: An Egyptian plane (per Candace Owens) landed and stayed the night of 9/10 (assassination day); alleged foreign-dignitary pickup transferred to 920 N King St (joint DHS/FBI/DEA office). See geographic_concentration and criticisms sections below.
      israel_trips: |
        Full date list compiled from logs (logs show CAI → CAI or N/A → CAI; users claim transponder blackout and actual Israel landings). Year per source context ~2024/2025:
          January: Jan 05, Jan 12, Jan 26
          February: Feb 11, Feb 16, Feb 18, Feb 23
          March: Mar 18
          April: Apr 05, Apr 08
          May: May 27
          June: Jun 14, Jun 18, Jun 21, Jun 22
          July: Jul 05, Jul 08 (Two Flights), Jul 13
          August: Aug 05
          September: Sep 20 (Two Flights), Sep 21, Sep 30 (Two Flights)
          October: Oct 13, Oct 21, Oct 22, Oct 26
          November: Nov 18, Nov 30
          December: Dec 02, Dec 07
      corroborated_flights:
        - date: October 21, 2025
          detail: SU-BTT flew Cairo to Israel reportedly carrying head of Egyptian intelligence Hassan Rashad, per Israeli Channel 12 News. Cited on X as a corroborated example of the Cairo–Israel routing.
      flight_logs:
        - log: Sep 4, 2025 — Minot → Provo (full inbound load per user logs)
        - log: Sep 10, 2025 — Provo → Wilmington (lighter outbound, post-hit per user logs)
        - log: Recent — Paris-Le Bourget (LBG) → Wichita, KS (ICT) ("touched down in Kansas," aerospace/defense capital)
      dugway_claim: |
        @ProjectConstitu video: "The Mysterious Egyptian Government Jet SU-BTT Didn't Depart from Provo... It Took Off from DUGWAY PROVING GROUND... transponder OFF... Classic stealth protocol." Claim: materialized mid-air near Utah, actually launched from Dugway Proving Ground (restricted Michael Army Airfield), transponder OFF until clearing R-6404 no-fly zone; mislabeled as Provo departure.
      detailed_x_analysis: |
        @ProjectConstitu: "BOMBSHELL: The ASSASSINATION Plane From Sept 10th Is Back—EGYPTIAN Military Aircraft SU-BTT Just TOUCHED Down in Kansas." Candace Owens timelines: systematic tracking of Turning Point Faith events; shadowing domestic political targets. @NihiloX: Irrefutable evidence SU-BTT regularly flies into Israel — ADSB pattern: flies south, goes dark, eye-witness places Egyptian Chief of Intelligence landing in Israel shortly after blackout; conclusion: Egypt lying about relationship with Israel; possible Israel connection to Egyptian jets on ground day of assassination. Many posts: "Egyptian military planes in Provo at Provo Municipal Airport on 9/10/25. Tail# SU-BTT flew in on 9/4/25 and departed the morning of 9/10/25." "Sitting on the tarmac... dropped off members of the Egyptian military." Maintenance/service claims vs. conspiracy (Dassault not serviced every 2 weeks; ferrying flight). Operates pattern: flies into Paris for secret high-level government meetings (dead drop/neutral ground).
      conspiracy_theories: |
        Foreign surveillance/ops (Egyptian military/intel); joint with Mossad/Israeli interests; drop-off of assassination team / staging area "just miles from UVU" on day of assassination; part of multinational plot; tracking Erika/Charlie for years; "smoking gun"; possible cover or operational support on day of hit. Broader: Israeli gov involvement via Egyptian planes/proxies.
      relevant_dates: Multiple overlaps 2022–Sept 2025; Provo-area activity Sept 4–10, 2025 (arrival 9/4, departure morning of 9/10); post-event flights (e.g., to Wichita KS)
      tracking_notes: Public ADS-B data shows unusual frequency near targets. X posts include timelines, flight maps, spreadsheets, and Candace Owens show clips. Israel-trip list compiled by @nihilox and shared by @ProjectConstitu. One claim: materialized mid-air near Utah, actually launched from Dugway Proving Ground (restricted Michael Army Airfield), transponder OFF until clearing R-6404 no-fly zone; mislabeled as Provo departure.
      trips:
        - trip_entry:
            start: Provo area, Utah (arrivals noted around early September 2025; specific: Sep 4 Minot → Provo full inbound per logs)
            destination: Provo, Utah / possible departure post-assassination (Sep 10 Provo → Wilmington lighter outbound post-hit per logs; claims of Dugway launch); earlier international routing via Paris-Le Bourget; recent: Paris (LBG) → Wichita, KS (ICT)
            y_interesting: |
              Patterned tracking of Kirk family and TPUSA events. X reports (amplified by Candace Owens) claim arrival/drop-off of military subcontractors in Provo ~Sept 4, 2025 (6 days before assassination), with activity continuing around Sept 10. Theories of foreign operatives or surveillance team insertion. One X post references tip about Egyptian plane leaving Provo morning of the assassination. Claim: dropped off plane full of Egyptian military soldiers just miles from UVU on day of assassination — staging area for assassination team. Operates pattern: flies into Paris for secret high-level government meetings (dead drop/neutral ground). Recent: touched down in Kansas (aerospace/defense capital). Broader "Armada" context with SU-BND.
            who: Egyptian Air Force / Government operators
            start_time: Multiple instances 2022–2025; specific Provo activity early Sept 2025 and around Sept 10 (morning departure claimed); Sep 4 inbound
            destination_time: Various; alleged post-event departure from Provo area; Sep 10 outbound
            other_properties: Dassault Falcon 7X. Frequent international and domestic overlaps with Kirk movements per X OSINT and Candace Owens timelines. ADSB pattern repeated: flies south, goes dark, eye-witness places Egyptian Chief of Intelligence landing in Israel shortly after blackout.

  - plane:
      identifier: N888KG
      aircraft_type: Bombardier Challenger 300 (BD-100-1A10)
      operator_owner: N888KG LLC (associated with Derek Maxfield / Komigo / Saprea foundation, which has Israel connections); Mormon couple owners, huge Chabad Lubavitch donors per X
      y_interesting: |
        The "Wendover Vanish" or "Provo Vanish" plane at center of major conspiracy theories on X. Departed Provo Airport (PVU, ~12 min from UVU) ~1 hour after the shooting. Mid-flight ADS-B/transponder gap (~30-50+ minutes while heading toward Page, AZ), then reappeared and returned to Provo. Owner stated it was a prescheduled flight; FAA/ATC termination was standard for non-towered airports. Conspiracists on X suspect getaway vehicle for shooter or related actors. FBI/Kash Patel addressed it, attributing gap to rural coverage (not illegal transponder off). Not part of official investigation per fact-checks, but timing and "vanish" fuel extensive speculation. Saprea/Israel links add layers to theories. Chabad Lubavitch donor ties fuel deeper speculation (Tucker calls out Chabad context in some posts). Many X posts question "Where is the shooter?" and link to possible cover.
      relevant_dates: September 10, 2025
      tracking_notes: Documented gap in public tracking (Flightradar24); owner clarification issued. Heavily discussed in X threads with flight path screenshots. Exact: Departed PVU ~1:11–1:20 PM MDT; ADS-B off ~1:43 PM near northern AZ border; reappeared ~2:30 PM departing PGA (Page, AZ); landed Provo ~3:06 PM.
      detailed_x_analysis: |
        Widespread X discussion: "Private Jet N888KG Mysteriously Disappears Off Radar After Charlie Kirk's Assassination." Fact-checks: NOT part of official investigation (FBI/ATF as of Sept 2025+). Owner statements and FAA explanations widely shared to counter theories. Owner Instagram: 7 company people boarded at Page for return; no one got off. Chabad Lubavitch donor link noted.
      conspiracy_theories: |
        Getaway vehicle for shooter or related actors; transponder deliberately off for covert ops; "Where is the shooter?" questions; possible cover-up element. Chabad Lubavitch donor ties fuel deeper speculation (Tucker calls out Chabad context in some posts).
      debunkings_official_responses: |
        Owner: prescheduled flight. FAA: standard practice for non-towered airports; radar services terminated mutually with Denver FAA center ~10 miles from PGA landing. No one disembarked at Page; company employees (7) boarded for return. Not part of investigation per fact-checks and officials (Kash Patel/FBI context). Debunked as routine.
      relevant_dates_extra: "Provo Vanish" central to "Where is the shooter?" narratives.
      trips:
        - trip_entry:
            start: Provo Airport (PVU), Utah
            destination: Page Municipal Airport (PGA), Arizona (then return to Provo)
            y_interesting: |
              N888KG flight. Departed ~1 hour after assassination. Mid-flight tracking gap (ADS-B disappearance ~30+ min). Owner: prescheduled; standard non-towered airport procedure (radar services terminated mutually with Denver FAA center ~10 miles from PGA landing). Conspiracists on X: possible shooter getaway or related. Not officially linked. Saprea foundation Israel connections fuel deeper theories. Owner Instagram: 7 company people boarded at Page for return; no one got off. Chabad Lubavitch donor link noted.
            who: Private charter / N888KG LLC (Derek Maxfield company)
            start_time: ~1:11–1:20 PM MDT, September 10, 2025
            destination_time: Landed PGA ~1:48 PM MDT; returned/landed Provo ~3:06 PM MDT
            other_properties: Aircraft: Bombardier Challenger 300. Tracking gap explained by owner/FAA as routine; rural area coverage issues cited by officials. X posts include video analysis and "vanish" memes.

