ISR_Program_Context: |
  Encompasses N1098L (HADES) and similar military ISR assets. Focus of citizen investigators on X (e.g., John Cullen) on surveillance capabilities, low-level ops, and potential real-time monitoring during the assassination. Routine ops vs. targeted use debated extensively online. Part of broader questions about aerial assets present on Sept 10, 2025.

kirk_assassination_theories_and_reasons:
  - entry: |
      What makes people interested/claim assassination (beyond official lone-gunman narrative) per X/Twitter discussions:
      - Official: Political assassination (Utah Gov. Spencer Cox). Targeted sniper shot (neck, ~142 yards from rooftop) during TPUSA event at UVU, Orem. Suspect Tyler James Robinson (22, leftist-leaning, internet-influenced) surrendered; left note about opportunity to kill "one of the nation's leading conservative voices"; charged with aggravated murder (death penalty sought). Evidence: rifle, DNA, messages. Official investigations (FBI/ATF) focus on Robinson as lone actor.
      - Conspiracy drivers from X: Timing/patterns of multiple planes (surveillance N1098L low passes during/after; N888KG "vanish" ~1hr later with radar gap; Egyptian SU-BTT/SU-BND tracking Erika Kirk for years + Provo departure/drop-offs; MARC N59906 pre-event circling; TPUSA N582MM patterns; SAM 99-0404 pre-event Ft Huachuca meetings; N102DZ/N40JD/N560TW arrivals). "Where is the shooter?" questions fueled by radar gaps and delayed responses.
      - Deeper theories on X: Not lone wolf (Discord chats, possible accomplices); deep state/FBI involvement (whistleblower claims: plane/pilot shortages delayed FBI response team by a day due to Director Kash Patel's jet use); foreign surveillance/ops (Egyptian planes + Israel ties via Saprea foundation for N888KG); TPUSA internal or cover-up elements; part of pattern attacking conservatives/Trump allies. Extensive X/Twitter OSINT by John Cullen, Candace Owens, and others amplifies interest due to public ADS-B data showing anomalies. Candace Owens' Egyptian plane timelines and "tips" widely shared. Some allege Mossad/Israeli involvement via proxies or Saprea links. Persistent due to unanswered questions on aviation activity despite official lone-gunman conclusion.

