Egyptian_Armada_Context: |
  Group entry covering the five tails (SU-BTT, SU-BND, SU-BTU, SU-BTV, SU-BGM). Heavily discussed on X via Candace Owens timelines claiming extensive tracking of Erika/Charlie Kirk movements 2022–2025, with specific Provo tarmac activity around the assassination. John Cullen noted maintenance contracts as explanation. Theories of foreign surveillance persist in conspiracy circles despite fact-checks on some overlap claims.
