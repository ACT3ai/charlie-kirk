  note_tweet: |
    Why was Officer Brian Davis ordered to fly to St. George at 8:30 PM if Tyler didn't actually turn himself in until 9:00 PM? By Davis's own admission, they already had SBI personnel down in St. George. Wouldn't it make sense to wait until you get confirmation from your agents on the ground that the suspect had definitely turned himself in before flying yourself, the Utah County attorney & 2 FBI agents down there?

    And listen to Davis bumble over his story as he tries to cover all verb tenses describing Tyler turning himself in: "Had...was turning himself in...or had turned himself in...was going to turn himself in."

    Well which was it Brian? Had Tyler turned himself in? Was Tyler in process of turning himself in? Or was he going to turn himself in? Can't be all 3. Pick one.

    IMO, it's only confusing or unclear if you're weaving a web of deception covering up the fact that Tyler had already turned himself in.
