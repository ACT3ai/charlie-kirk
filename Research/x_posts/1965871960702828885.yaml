  NOW: Eyewitness at Charlie Kirk’s event in Utah describes the harrowing moment the shot was fired.
  
  This is truly horrific. 
  
  “All of a sudden I heard just one pop.”
  
  “Saw Charlie all of a sudden… fall… his head kind of fell back and blood was just gushing out of his neck.”
  
  “At that point I kind of turned my head to look uphill because it felt like it came from up behind me.”
  
  “And then the next thing you know, they said ‘run’… so we all took off running.”
