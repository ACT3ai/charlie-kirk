  Candace Owens EXPLAINS Why The Exploding Mic Theory Explains ALMOST Everything

  In her latest episode, Candace Owens laid out why the rigged microphone theory is currently the most logical explanation for what happened to Charlie Kirk — because it makes sense of nearly every strange detail from that day.

  Here's what suddenly fits into place:

  - Bomb dogs were kept away from the scene. They would have detected the explosive.
  - The crime scene was immediately paved over and 8–10 inches of soil was excavated. PETN has extremely high soil absorption, so they had to dig it out.
  - The feds were urgently searching for Charlie's necklace. It was sitting directly on his chest when the device detonated, so it likely had explosive residue on it.
  - Shattered black plastic/glass was found all over the SUV that took Charlie to the hospital — consistent with a shattered Rode microphone.
  - No credible footage or eyewitnesses saw a shot fired from the Losee building rooftop — because no shot was actually fired from there.
  - Tyler Robinson was never given a standard GSR test. If he had been wearing the same clothes during a 33-hour manhunt, he would have failed it.
  - Terryl Farnsworth immediately contaminated the scene and removed SD cards before police secured the area — because the footage would have shown no bullet going through Charlie.
  - There was no ambulance on standby. Paramedics would have immediately seen evidence of an explosion rather than a gunshot wound.
  - Erika was quick to publicly forgive Tyler Robinson, but much more angry at Drewski weeks later. It's easier to forgive someone when you know they didn't actually do it.

  When you run the exploding mic theory, a lot of the chaos, the rushed cleanup, and the strange decisions suddenly stop looking random and start looking coordinated.

  FOLLOW @RealCandaceO — she continues to connect the dots that the official story ignores.
  Watch the full episode linked below. This theory is gaining serious traction for a reason.
