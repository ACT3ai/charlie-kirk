  From: [redacted]
  Sent: Thursday, 16 July 2026 03:43:01
  To: Candace Tips <tips@candaceowens.com>
  Subject: Axon Body Camera

  Hi Candace,

  Ive been following your investigation religiously since Charlie's passing. You and
  Charlie are both an inspiration to me.

  I am [redacted]. We use the same body camera that Utah city police use. The Axon
  Body Cam 4 model. I would be happy to look into any questions you might have about it.
  It bothered me that the officer claimed his camera died when he was on the roof top.
  The camera battery lasts approx 14 hours. At the end of every shift we have to dock
  our cameras, all on a detachment shared dock. The dock is also what uploads all the
  data and videos from the shift onto the server. We can then review the videos on the
  Axon website, this website is the same across North America. The camera video also
  captures a GPS route of exactly everywhere the officer walked. To turn on the
  recording we press the middle button twice, it automatically saves the 30 seconds
  before that. To turn the video off you have to hold the button down for a few seconds.
  At the end of the video you can usually see the officers hand moving toward the button
  and even blocking the lens a bit with their hand. I'll also mention you get a reminder
  when the battery is going to die, it does a high pitched tone and vibrates 4 times at
  10% left and again at 5%. So there's no way he didn't know his battery was going to
  die. The Axon Body 4 system also logs and records the specific reason a video stops or
  the device turns off. All of this information can be seen on the Axon site that the
  police have access to and can review.

  Please let me know if you want to see anything or ask any questions about the Axon
  body camera.
