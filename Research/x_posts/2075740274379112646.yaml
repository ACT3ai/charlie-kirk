    ‼️BREAKING: Resurfaced Footage Captures New SUSPECT In All Black Fleeing UVU — Looks MORE Like Lance Twiggs Than Tyler Robinson

    New video has resurfaced showing a man running from the UVU crime scene on 9/10, filmed by a witness who believed he was the real suspect. The man is seen wearing all black, with a black backpack and long dark hair — matching multiple descriptions from that day.

    Construction worker Dylan Hope previously described coming into contact with a man right after the shooting who said "someone's been shot." He described him as wearing a black trench coat, black cargo pants, black COVID mask, black sunglasses, and having long greasy black hair while carrying a small backpack.

    That description also closely matches what was broadcast over police dispatch that day: a suspect wearing all black, black mask, and carrying a long gun. The only known footage of a person on the roof also shows someone dressed entirely in black in a prone position on the Losee building.

    This new video does not appear to show Tyler Robinson — however, the poster claims the man bears a resemblance to Lance Twiggs, particularly in hair length, color, and profile, though the footage is described as too blurry to make a positive identification.

