text: |
  DID YOU KNOW THAT THE NIGHT BEFORE CHARLIE KIRK WAS ASSASSINATED, TWO UNIDENTIFIED MEN WALKED INTO A UVU OFFICE AT 10:35 PM AND ASKED TO SPEAK WITH POLICE ABOUT "A PLAN"?

  UVU staff considered it serious enough to notify the university cabinet.

  The university president's office.

  Then 44 minutes later someone dropped into the chat and said they were just "GOP reps who played like they knew more than they did."

  Nobody in the chat asked what the plan was.

  Nobody documented what the two men told police.

  Their names are REDACTED.

  14 hours later Charlie Kirk was shot from a rooftop and KILLED.

  That same day, September 9, a separate email at 2:23 PM was sent through UVU Police Chief Jeff Long's communication chain.

  Subject line: FYI.
  The email reads: "He wants us to get a message to Charlie Kirk. His phone number is [REDACTED]."

  The name of the person wanting to reach Kirk is REDACTED.
  The phone number is REDACTED.
  Whether the message was ever delivered is not documented anywhere in the 112 pages.

  TWO separate people tried to flag something about this event the day before it happened. Both were either dismissed or buried.

  Also in those documents:

  Orem Police Department sent UVU the Charlie Kirk ticket link on September 3.
  Subject line: "Charlie Kirk Tickets."
  After the shooting, Orem PD said they were "not involved."
  UVU pays Orem PD annually for a joint Public Order Unit designed for exactly this type of event.

  It was never activated.

  The Run-Hide-Fight emergency alert sent to campus 88 minutes after the shooting still had placeholder text in it.

  It literally read: "Shooter in [INSERT location]."
  They forgot to type in where the shooter was.

  The first alert 19 minutes after the shooting falsely stated "suspect in custody."
  The suspect was not in custody. 10,000 students stayed on campus thinking it was safe.

  Faculty had never been trained on active shooter protocols.

  No ambulance was on site.

  No outside law enforcement was coordinated.

  6 campus cops for a crowd the chief later called 3,000.

  UVU has acknowledged that additional documents exist and has refused to release them.

  Every name in the September 9 communications is redacted under Utah state law exemptions for "security of public property" and "privacy."

  The suspect has been in custody for 7 months.
  The event is over.
  There is no ongoing security threat to the campus.

  So why are the names still hidden?

  Who were the two men?

  What was the plan?

  Was the message to Kirk ever delivered?

  Document references: UVU 25-330:0023, 0024, 0079, 0080.

  Source: Daily Caller News Foundation GRAMA records request. 50 documents. 112 pages.

  I read every single one.

