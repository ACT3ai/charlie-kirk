  ‼️Former Turning Point USA Rep BLOWS the Whistle: STRIPPER Vans, Getting New Hires Drunk, and FOREIGN Intelligence Recruitment

  A former Turning Point USA representative named Joshua Peterson (@RagingPatriot20) came forward with a disturbing account from his time at TPUSA training. According to him, after the first few days of intense training, new hires were taken out by former representatives in rented stripper vans — complete with stripper poles inside — to bars in Arizona.

  Once there, the reps got the new hires drunk and began pulling people outside one by one. When it was Peterson's turn, they asked him about his views on "Our Greatest Ally" and "Our Greatest Allies Military". He says they then admitted they were part of "Our greatest Allies" intelligence agency and revealed they had been working at Turning Point USA for the past four to five years.

  This is a serious allegation. If true, it suggests that foreign intelligence operatives were not only embedded inside Turning Point USA but were actively trying to recruit and vet new staff while engaging in highly unprofessional and degenerate behavior with new hires.
  This needs to be investigated.
