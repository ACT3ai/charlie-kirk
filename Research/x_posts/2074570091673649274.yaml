  Military Intelligence Corps. @ArtifexMemor (former TPUSA/Charlie Kirk staffer) circulated
  this Feb 2022 exchange as a pointer to Jack Posobiec's documented Naval intelligence
  background. Both Posobiec and Bowyer are living public figures. The exchange is banter;
  nothing in it connects either to the Sept 10 2025 assassination. Relevant to the site's
  intelligence-services-connections theme as CONTEXT only, not accusation.
