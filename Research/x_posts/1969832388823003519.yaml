  🚨🇺🇸 ERIKA KIRK TAKES THE TORCH AFTER CHARLIE’S ASSASSINATION
  
  Erika begged Charlie to wear a vest before he was shot while debating on campus, but he pressed forward with the mission he loved.
  
  Now she leads Turning Point USA, described as its “beating heart” and backed personally by Trump, who called her twice with support.
  
  Through tears, she framed Charlie’s death as part of God’s plan and vowed: 
  
  “No one will ever forget my husband’s name, and I will make sure of it.”
  
