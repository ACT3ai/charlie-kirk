  🚨BREAKING: Every single district and magistrate judge in the Middle District of Tennessee has just recused themselves from Brian Harpole's defamation case against Candace Owens.

  Let's be clear: this never happens.

  Normally, if a judge has a conflict, the case is simply reassigned to a colleague down the hall. In this instance, the entire district is totally locked out.

  The Sixth Circuit Court of Appeals is now being forced to bus in an outside judge from an entirely different jurisdiction.

  Why the retreat?

  Think about it. If Mitch Snow's reporting is accurate, and that meeting at Fort Huachuca with high-ranking military officials actually took place, the establishment cannot risk this hitting discovery.

  If this goes to a courtroom, subpoenaing those military officials exposes exactly what they are desperate to hide.
