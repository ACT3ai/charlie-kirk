text: |
  🧠📡 Microwave Hearing (Frey Effect) aka V2K

  Pulsed microwaves can create audible sensations inside your head: clicks, buzzes,
  chirps, or muffled sounds - without any speaker or ear involvement. This is the
  Frey Effect (microwave auditory effect), first noted near radar in WWII and
  studied in detail by neuroscientist Allan Frey in 1961–62. It works via tiny,
  rapid heating of brain tissue that creates a pressure wave the cochlea picks up.
  Experiments in the 1970s even showed voice-modulated microwaves could transmit
  recognizable words. A 1989 patent (US4877027A) describes a system to do exactly
  this with specific pulsed waveforms.

  V2K claims: "Voice to Skull" is the term used in conspiracy (realist) circles for
  alleged directed-energy weapons that beam clear voices or commands into people's
  heads for harassment or mind control.

  Official docs mention conceptual non-lethal "voice to skull devices" using pulsed
  microwaves (even an "electronic scarecrow" for birds), and projects like MEDUSA
  explored crowd-control uses.

  The basic Frey Effect is real and lab-proven. Turning it into practical,
  long-range, intelligible voice projection for covert mind control faces huge
  technical barriers (power, targeting, safety, consistency). Listen below for a
  demonstration on CIA / DARPA's Project Pandora's Microwave Voice To Skull
  Technology
